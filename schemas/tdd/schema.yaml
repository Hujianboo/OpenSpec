name: tdd
version: 1
description: Test-driven workflow - proposal → specs → test-plan → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.

      This is the foundation - specs, test-plan, design, and tasks all build on this.
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications with GIVEN/WHEN/THEN scenarios
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with GIVEN/WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      TDD-specific format:
      - Scenarios MUST use GIVEN/WHEN/THEN structure:
        - **GIVEN** preconditions (setup state)
        - **WHEN** action (trigger)
        - **THEN** expected outcome (assertion)
      - GIVEN is optional if the precondition is trivial.
      - Scenarios that CANNOT be verified with automated tests (UI visuals, animations,
        hardware-dependent features) MUST be marked with `<!-- manual-verify -->` after
        the scenario heading.
      - The classification question: "Can you write an assert with a deterministic expected value?"
        If no, mark it `<!-- manual-verify -->`.

      Example:
      ```
      ## ADDED Requirements

      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **GIVEN** user has data in their account
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      #### Scenario: Export button visual state <!-- manual-verify -->
      - **WHEN** user hovers over the Export button
      - **THEN** button shows a highlighted state with download icon
      ```

      Specs should be testable - each scenario is a potential test case.
      Scenarios without `<!-- manual-verify -->` WILL be turned into automated tests
      in the test-plan phase.
    requires:
      - proposal

  - id: test-plan
    generates: test-plan.md
    description: Verification strategy derived from spec scenarios
    template: test-plan.md
    instruction: |
      Create the test plan that defines HOW to verify each spec scenario.

      Read all completed spec files first. For each scenario, classify it and create
      a verification item.

      Classification criteria - ask: "Can I write an assert with a deterministic expected value?"
      - **Yes** → `auto-test`: Write a test with Setup/Action/Assert
      - **"Looks right"** → `visual`: Visual inspection, Storybook, or screenshot comparison
      - **"Try on real device"** → `manual`: Manual testing on specific device/environment

      Structure:
      - Group verification items by module/component, NOT by spec file
      - Each module section header includes its type: `## N. Module Name (auto-test|visual|manual)`
      - Each item traces back to a spec scenario: `### From Spec: <scenario name>`

      For auto-test items:
      - **Test**: What the test verifies (one sentence)
      - **Setup**: Preconditions / test fixtures
      - **Action**: What to execute
      - **Assert**: Expected result with deterministic value

      For visual items:
      - **Check**: What to visually verify
      - **How**: Verification method (Storybook, browser, specific viewport)
      - **Acceptance**: What "passing" looks like in visual terms

      For manual items:
      - **Check**: What to verify
      - **Steps**: Step-by-step verification procedure
      - **Acceptance**: What "passing" looks like

      Guidelines:
      - Don't force auto-test on things that aren't deterministic
      - Backend logic / data processing → almost always auto-test
      - State management → usually auto-test
      - UI visual styling / animations → usually visual
      - Hardware features / third-party SDK integration → usually manual
      - When in doubt, prefer auto-test over visual, and visual over manual
    requires:
      - specs

  - id: design
    generates: design.md
    description: Technical design with test strategy
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      Read the test-plan first. The verification strategy should inform your
      technical decisions - modules that need auto-testing should have testable
      interfaces (dependency injection, pure functions, clear boundaries).

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Test Strategy**: How the architecture supports testability:
        - Testing framework and tools
        - Module boundaries that enable unit testing
        - Mock/stub strategy for external dependencies
        - Which layers get auto-tested vs visual/manual verification
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation, specs for requirements, and
      test-plan for verification strategy.

      Good design docs explain the "why" behind technical decisions.
      The test strategy section should explain HOW the architecture makes
      the code testable, not just WHAT will be tested.
    requires:
      - proposal
      - test-plan

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with TDD task labels
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work using TDD labels.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Every task MUST have one of these labels:

      - `[RED]` — Write a failing test. You MUST see the test fail before marking complete.
      - `[GREEN]` — Write the minimum code to make the test pass. All tests MUST pass.
      - `[REFACTOR]` — Improve code structure. Tests MUST stay green throughout.
      - `[UI]` — Visual/style task. No automated test required. Verify by visual inspection.
      - `[VERIFY]` — Manual verification checkpoint. Describe what to check and how.

      Ordering rules:
      - Every `[GREEN]` MUST be preceded by a `[RED]` for the same test
      - `[REFACTOR]` only appears after `[GREEN]`
      - Do NOT use `[UI]` to avoid testing logic with deterministic inputs/outputs

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y [LABEL] Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)
      - Reference the test-plan to decide which tasks get [RED]/[GREEN] vs [UI]/[VERIFY]

      Example:
      ```
      ## 1. Data Export Logic (strict TDD)

      - [ ] 1.1 [RED] Write failing test: exportUserData returns CSV with headers
      - [ ] 1.2 [GREEN] Implement exportUserData
      - [ ] 1.3 [RED] Write failing test: empty data returns headers-only CSV
      - [ ] 1.4 [GREEN] Handle empty data case
      - [ ] 1.5 [REFACTOR] Extract CSV formatting utility

      ## 2. Export UI (visual verification)

      - [ ] 2.1 [UI] Create ExportButton component
      - [ ] 2.2 [UI] Add loading spinner animation
      - [ ] 2.3 [VERIFY] Manual: check button on desktop and mobile viewports
      ```
    requires:
      - specs
      - test-plan
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Work through pending tasks following the TDD label discipline.

    For each task, check its label and follow the corresponding protocol:

    **[RED] tasks — Write a failing test:**
    1. Write the test (and ONLY the test)
    2. Run the test suite
    3. Confirm the new test FAILS (red)
    4. If the test passes without implementation, the test is wrong — fix it
    5. Mark task complete

    **[GREEN] tasks — Make the test pass:**
    1. Write the MINIMUM code to make the failing test pass
    2. Run the test suite
    3. Confirm ALL tests pass (green)
    4. Do not add code beyond what the test requires
    5. Mark task complete

    **[REFACTOR] tasks — Clean up:**
    1. Improve code structure (extract, rename, simplify)
    2. Run the test suite AFTER EACH change
    3. If any test fails, undo the last change immediately
    4. All tests MUST stay green throughout
    5. Mark task complete

    **[UI] tasks — Visual work:**
    1. Implement the visual/style changes
    2. Verify by visual inspection (browser, Storybook, device)
    3. No automated test required
    4. Mark task complete

    **[VERIFY] tasks — Manual checkpoint:**
    1. Follow the verification steps described in the task
    2. Record what you checked and the result
    3. Mark task complete

    IRON RULE: If you find yourself writing implementation code before its
    corresponding [RED] test exists, STOP. Delete the implementation. Go back
    to the [RED] task. This is not optional.

    Pause if you hit blockers or need clarification.
